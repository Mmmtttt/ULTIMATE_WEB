name: test-gate

on:
  push:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install archive runtime tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends p7zip-full unrar-free

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            comic_backend/requirements.txt
            tests/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: comic_frontend/package-lock.json

      - name: Install backend and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r comic_backend/requirements.txt -r tests/requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: comic_frontend

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: comic_frontend

      - name: Prepare test artifact directory
        run: mkdir -p tests/ci-artifacts

      - name: Run backend integration tests
        id: integration_tests
        continue-on-error: true
        run: |
          set -o pipefail
          python -m pytest tests/features -m integration --junitxml=tests/ci-artifacts/integration-junit.xml 2>&1 | tee tests/ci-artifacts/integration.log

      - name: Run frontend E2E tests
        id: e2e_tests
        if: always()
        continue-on-error: true
        run: |
          set -o pipefail
          python tests/tools/run_e2e.py 2>&1 | tee tests/ci-artifacts/e2e.log

      - name: Upload integration and gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-gate-logs
          path: tests/ci-artifacts
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: tests/test-results
          if-no-files-found: ignore

      - name: Enforce gate status
        if: always()
        run: |
          echo "integration outcome: ${{ steps.integration_tests.outcome }}"
          echo "e2e outcome: ${{ steps.e2e_tests.outcome }}"
          if [ "${{ steps.integration_tests.outcome }}" != "success" ] || [ "${{ steps.e2e_tests.outcome }}" != "success" ]; then
            echo "::error::Test gate failed. Check uploaded logs and reports."
            exit 1
          fi
