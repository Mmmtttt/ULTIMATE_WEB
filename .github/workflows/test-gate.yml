name: test-gate

on:
  push:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            comic_backend/requirements.txt
            tests/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: comic_frontend/package-lock.json

      - name: Install backend and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r comic_backend/requirements.txt -r tests/requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: comic_frontend

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: comic_frontend

      - name: Run backend integration tests
        run: python -m pytest tests/features -m integration

      - name: Run frontend E2E tests
        run: python tests/tools/run_e2e.py

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: tests/test-results
          if-no-files-found: ignore
