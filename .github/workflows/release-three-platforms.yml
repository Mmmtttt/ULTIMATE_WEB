name: release-three-platforms

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "Override release version (for example 1.2.3). Leave empty to auto-resolve."
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  resolve_release_version:
    name: resolve-release-version
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      app_version: ${{ steps.resolve.outputs.app_version }}
    steps:
      - name: checkout code
        uses: actions/checkout@v4.2.1

      - name: resolve app version
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          RAW_VERSION="${{ github.event.inputs.app_version || '' }}"
          if [[ -z "$RAW_VERSION" ]]; then
            RAW_VERSION="${GITHUB_REF_NAME:-}"
          fi
          RESOLVED_VERSION="$(python scripts/versioning.py \
            --raw-version "$RAW_VERSION" \
            --package-json "comic_frontend/package.json" \
            --run-number "${GITHUB_RUN_NUMBER:-0}")"
          echo "app_version=${RESOLVED_VERSION}" >> "$GITHUB_OUTPUT"

      - name: print resolved app version
        shell: bash
        run: |
          echo "Resolved APP_VERSION: ${{ steps.resolve.outputs.app_version }}"

  build_targets:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: resolve_release_version
    # 强制使用Node.js 24运行Action，解决弃用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APP_VERSION: ${{ needs.resolve_release_version.outputs.app_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            runner: windows-latest
            build_android: false
            build_desktop: true
          - target: linux
            runner: ubuntu-latest
            build_android: false
            build_desktop: true
          - target: android
            runner: ubuntu-latest
            build_android: true
            build_desktop: false

    steps:
      - name: checkout code (desktop with submodules)
        if: ${{ matrix.build_desktop }}
        uses: actions/checkout@v4.2.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: checkout code (android without submodules)
        if: ${{ matrix.build_android }}
        uses: actions/checkout@v4.2.1

      - name: setup python 3.13
        uses: actions/setup-python@v5.1.1  # 适配Node24的最新稳定版
        with:
          python-version: "3.13"  # 升级到Python 3.13，解决f-string反斜杠问题
          cache: "pip"  # 可选：缓存pip依赖，加速构建

      - name: setup node.js 20
        uses: actions/setup-node@v4.0.2  # 适配Node24的最新稳定版
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: comic_frontend/package-lock.json

      - name: install archive runtime tools (linux desktop)
        if: ${{ matrix.build_desktop && matrix.target == 'linux' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends p7zip-full unrar-free

      - name: install archive runtime tools (windows desktop)
        if: ${{ matrix.build_desktop && matrix.target == 'windows' }}
        shell: pwsh
        run: |
          choco install 7zip -y --no-progress

      - name: install backend dependencies (desktop only)
        if: ${{ matrix.build_desktop }}
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r comic_backend/requirements.txt pyinstaller

      - name: install frontend dependencies
        shell: bash
        run: |
          cd comic_frontend
          npm ci --no-audit --no-fund  # 更严格的依赖安装，避免警告
          npm run build  # 可选：提前构建前端，便于排查问题

      - name: setup java (android only)
        if: ${{ matrix.build_android }}
        uses: actions/setup-java@v4.2.1  # 适配Node24的最新稳定版
        with:
          distribution: temurin
          java-version: "21"

      - name: setup android sdk (android only)
        if: ${{ matrix.build_android }}
        uses: android-actions/setup-android@v3

      - name: install android platforms (android only)
        if: ${{ matrix.build_android }}
        shell: bash
        run: |
          # 修复Broken pipe问题：用echo y替代yes，不屏蔽输出便于排查
          echo "y" | sdkmanager --licenses
          # 安装指定安卓版本，添加--verbose查看详细日志
          sdkmanager --verbose \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"
          # 验证安装结果，确保依赖安装成功
          sdkmanager --list | grep -E "android-34|build-tools;34.0.0"
          # 新增：验证安卓环境变量（确保ANDROID_HOME正确）
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "PATH: $PATH"
          # 验证adb是否可用（确认SDK安装成功）
          adb --version || echo "adb not found, check SDK installation"

      - name: prepare android archive runtime tools (7zz)
        if: ${{ matrix.build_android }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          import shutil
          import subprocess
          import tempfile
          import urllib.request
          from pathlib import Path

          INDEX_URLS = [
              "https://packages.termux.dev/apt/termux-main/pool/main/7/7zip/",
              "https://packages-cf.termux.dev/apt/termux-main/pool/main/7/7zip/",
          ]
          ABI_MAP = {
              "arm64-v8a": "aarch64",
              "x86_64": "x86_64",
          }
          OUTPUT_ROOT = Path("build/android_archive_tools")
          OUTPUT_ROOT.mkdir(parents=True, exist_ok=True)

          def parse_version_tuple(version_text: str):
              parts = re.split(r"[._-]", version_text)
              normalized = []
              for part in parts:
                  if part.isdigit():
                      normalized.append((0, int(part)))
                  else:
                      normalized.append((1, part))
              return tuple(normalized)

          html = None
          selected_index_url = None
          for candidate in INDEX_URLS:
              try:
                  with urllib.request.urlopen(candidate, timeout=30) as resp:
                      html = resp.read().decode("utf-8", errors="ignore")
                  selected_index_url = candidate
                  print(f"[android-archive] using index: {candidate}")
                  break
              except Exception as exc:
                  print(f"[android-archive] index unavailable: {candidate} ({exc})")
          if html is None or selected_index_url is None:
              raise SystemExit("cannot fetch termux 7zip index from all mirrors")

          with tempfile.TemporaryDirectory() as tmp:
              tmp_root = Path(tmp)
              for android_abi, termux_abi in ABI_MAP.items():
                  pattern = re.compile(
                      rf'href="(7zip_([0-9][^"_]*)_{re.escape(termux_abi)}\.deb)"'
                  )
                  matches = pattern.findall(html)
                  if not matches:
                      raise SystemExit(
                          f"cannot find 7zip package for abi={termux_abi} from {selected_index_url}"
                      )
                  package_name, package_version = max(
                      matches, key=lambda item: parse_version_tuple(item[1])
                  )
                  deb_path = tmp_root / package_name
                  downloaded = False
                  for base in INDEX_URLS:
                      package_url = base + package_name
                      try:
                          print(f"[android-archive] downloading {package_url}")
                          urllib.request.urlretrieve(package_url, deb_path)
                          downloaded = True
                          break
                      except Exception as exc:
                          print(f"[android-archive] download failed: {package_url} ({exc})")
                  if not downloaded:
                      raise SystemExit(f"failed to download package {package_name} from all mirrors")

                  extract_dir = tmp_root / f"extract-{android_abi}"
                  extract_dir.mkdir(parents=True, exist_ok=True)
                  subprocess.run(["dpkg-deb", "-x", str(deb_path), str(extract_dir)], check=True)

                  candidates = sorted(
                      p for p in extract_dir.rglob("7zz") if p.is_file()
                  )
                  if not candidates:
                      raise SystemExit(f"7zz not found after extracting {package_name}")
                  preferred = next(
                      (p for p in candidates if str(p).replace("\\", "/").endswith("/bin/7zz")),
                      candidates[0],
                  )

                  abi_dir = OUTPUT_ROOT / android_abi
                  abi_dir.mkdir(parents=True, exist_ok=True)
                  target = abi_dir / "7zz"
                  shutil.copy2(preferred, target)
                  target.chmod(0o755)
                  print(
                      f"[android-archive] prepared abi={android_abi} version={package_version} "
                      f"target={target.as_posix()} source={preferred.as_posix()}"
                  )
          PY

          echo "[android-archive] final files:"
          ls -lah build/android_archive_tools/arm64-v8a/7zz build/android_archive_tools/x86_64/7zz

      - name: run unified release script
        shell: bash
        run: |
          # 打印环境信息（简化版，避免语法错误）
          python --version
          node --version
          java --version 2>&1 | head -n1
          echo "Resolved APP_VERSION: $APP_VERSION"
          # 执行发布脚本（单行命令，避免多行换行问题）
          python scripts/release_unified.py --targets "${{ matrix.target }}" --execute --build-output output/ci_stage --package-output output/ci_packages --app-version "$APP_VERSION"
          # 打印安卓日志（仅安卓平台）
          if [ "${{ matrix.build_android }}" = "true" ]; then
            if [ -f "output/ci_packages/android/android_build.log" ]; then
              echo "=== Android Build Log ==="
              cat output/ci_packages/android/android_build.log
            fi
          fi

      # 新增：上传安卓构建日志（无论成功/失败都执行）
      - name: upload android build logs (if failed)
        if: ${{ matrix.build_android && always() }}  # 仅安卓平台执行，且失败也运行
        uses: actions/upload-artifact@v4.3.4
        with:
          name: android-build-logs
          path: |
            output/ci_packages/android/android_build.log
            output/ci_packages/packaging_summary.json  # 同时上传汇总文件
          if-no-files-found: warn  # 日志文件不存在也不报错

      # 新增：上传桌面端构建日志（无论成功/失败都执行）
      - name: upload desktop build logs (if failed)
        if: ${{ matrix.build_desktop && always() }}
        uses: actions/upload-artifact@v4.3.4
        with:
          name: desktop-build-logs-${{ matrix.target }}
          path: |
            output/ci_packages/${{ matrix.target }}/pyinstaller.log
            output/ci_packages/packaging_summary.json
          if-no-files-found: warn

      - name: print packaging summary
        shell: bash
        run: |
          cat "output/ci_packages/packaging_summary.json" || echo "Summary file not found"

      - name: verify target build status
        shell: bash
        run: |
          python scripts/verify_packaging_summary.py \
            --summary output/ci_packages/packaging_summary.json \
            --target "${{ matrix.target }}" \
            --require-status built

      - name: upload desktop release bundle artifact
        if: ${{ matrix.build_desktop }}
        uses: actions/upload-artifact@v4.3.4  # 适配Node24的最新稳定版
        with:
          name: ultimate-${{ matrix.target }}
          path: output/ci_packages/${{ matrix.target }}/release_bundle
          if-no-files-found: error
          retention-days: 14  # 可选：设置产物保留天数

      - name: upload android apk artifact
        if: ${{ matrix.build_android }}
        uses: actions/upload-artifact@v4.3.4  # 适配Node24的最新稳定版
        with:
          name: ultimate-${{ matrix.target }}
          path: output/ci_packages/${{ matrix.target }}/apk
          if-no-files-found: error
          retention-days: 14  # 可选：设置产物保留天数

  collect_artifacts:
    name: collect-artifacts
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    needs: build_targets
    steps:
      - name: download all target artifacts
        uses: actions/download-artifact@v4.1.7  # 适配Node24的最新稳定版
        with:
          pattern: ultimate-*
          path: output/release_bundle

      - name: generate release manifest (SHA256)
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          root = Path("output/release_bundle")
          root.mkdir(parents=True, exist_ok=True)
          lines = []

          for path in sorted(root.rglob("*")):
              if path.is_file():
                  with open(path, "rb") as f:
                      sha256 = hashlib.sha256(f.read()).hexdigest()
                  rel_path = path.relative_to(root).as_posix()
                  lines.append(f"{sha256}  {rel_path}")

          manifest_file = root / "RELEASE_MANIFEST_SHA256.txt"
          with open(manifest_file, "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")

          print(f"Generated manifest: {manifest_file}")
          print(manifest_file.read_text(encoding="utf-8"))
          PY

      - name: upload merged release bundle
        uses: actions/upload-artifact@v4.3.4
        with:
          name: ultimate-release-bundle
          path: output/release_bundle
          if-no-files-found: error
          retention-days: 14

  publish_docker:
    name: publish-docker
    runs-on: ubuntu-latest
    needs:
      - resolve_release_version
      - collect_artifacts
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: checkout code
        uses: actions/checkout@v4.2.1
        with:
          submodules: recursive
          fetch-depth: 0

      - name: set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: resolve DockerHub image name
        id: image
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
        run: |
          set -euo pipefail
          IMAGE_NAME="${DOCKERHUB_IMAGE:-}"
          if [[ -z "$IMAGE_NAME" ]]; then
            if [[ -z "${DOCKERHUB_USERNAME:-}" ]]; then
              echo "DOCKERHUB_USERNAME secret is required when DOCKERHUB_IMAGE is not set" >&2
              exit 1
            fi
            IMAGE_NAME="${DOCKERHUB_USERNAME}/ultimate-web"
          fi
          IMAGE_NAME="$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "Docker image: ${IMAGE_NAME}"

      - name: log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image_name }}
          tags: |
            type=raw,value=${{ needs.resolve_release_version.outputs.app_version }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=ultimate-web
            org.opencontainers.image.version=${{ needs.resolve_release_version.outputs.app_version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ needs.resolve_release_version.outputs.app_version }}
