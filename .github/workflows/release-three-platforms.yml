name: release-three-platforms

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build_targets:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            runner: windows-latest
            build_android: false
            build_desktop: true
          - target: linux
            runner: ubuntu-latest
            build_android: false
            build_desktop: true
          - target: android
            runner: ubuntu-latest
            build_android: true
            build_desktop: false

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: comic_frontend/package-lock.json

      - name: install-backend-dependencies
        if: ${{ matrix.build_desktop }}
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r comic_backend/requirements.txt pyinstaller

      - name: install-frontend-dependencies
        shell: bash
        run: npm ci --prefix comic_frontend

      - name: setup-java
        if: ${{ matrix.build_android }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: setup-android-sdk
        if: ${{ matrix.build_android }}
        uses: android-actions/setup-android@v3

      - name: install-android-platforms
        if: ${{ matrix.build_android }}
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: run-unified-release
        shell: bash
        run: |
          python scripts/release_unified.py \
            --targets "${{ matrix.target }}" \
            --execute \
            --build-output output/ci_stage \
            --package-output output/ci_packages

      - name: print-packaging-summary
        shell: bash
        run: cat "output/ci_packages/packaging_summary.json"

      - name: verify-target-status
        shell: bash
        run: |
          python scripts/verify_packaging_summary.py \
            --summary output/ci_packages/packaging_summary.json \
            --target "${{ matrix.target }}" \
            --require-status built

      - name: upload-target-artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultimate-${{ matrix.target }}
          path: output/ci_packages/${{ matrix.target }}
          if-no-files-found: error

  collect_artifacts:
    name: collect-artifacts
    runs-on: ubuntu-latest
    needs: build_targets
    steps:
      - name: download-all-target-artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ultimate-*
          path: output/release_bundle

      - name: generate-release-manifest
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          root = Path("output/release_bundle")
          lines = []
          for path in sorted(root.rglob("*")):
              if not path.is_file():
                  continue
              sha = hashlib.sha256(path.read_bytes()).hexdigest()
              rel = path.relative_to(root).as_posix()
              lines.append(f"{sha}  {rel}")

          manifest = root / "RELEASE_MANIFEST_SHA256.txt"
          manifest.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"manifest: {manifest}")
          PY

      - name: upload-merged-release-bundle
        uses: actions/upload-artifact@v4
        with:
          name: ultimate-release-bundle
          path: output/release_bundle
          if-no-files-found: error
